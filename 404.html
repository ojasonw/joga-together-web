<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Joga Together | 404 — Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="/js/tailwind.config.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center px-8 selection:bg-primary-container selection:text-on-primary-container">
<!-- Background glow -->
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>

<main class="flex flex-col items-center text-center max-w-2xl">
  <!-- Brand -->
  <a href="/" class="text-xl font-bold tracking-tighter text-on-surface mb-16">joga-together</a>

  <!-- Error code -->
  <div class="relative mb-8">
    <span class="text-[160px] font-extrabold tracking-tighter leading-none text-gradient select-none">404</span>
  </div>

  <!-- Message -->
  <h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-4">Room not found.</h1>
  <p class="text-on-surface-variant text-lg leading-relaxed mb-12 max-w-md">
    Looks like this lobby was disbanded, never existed, or got lost in the void.
    Head back to the arena and find your squad.
  </p>

  <!-- Actions -->
  <div class="flex flex-wrap gap-4 justify-center">
    <a href="/" class="primary-btn-gradient text-on-primary-container px-10 py-4 rounded-lg font-bold text-base hover:scale-[1.02] transition-transform duration-200 flex items-center gap-2">
      <span class="material-symbols-outlined">home</span>
      Back to Home
    </a>
    <a href="/browse-rooms" class="bg-surface-container-high text-on-surface px-10 py-4 rounded-lg font-bold text-base ghost-border hover:bg-surface-bright transition-colors duration-200 flex items-center gap-2">
      <span class="material-symbols-outlined">explore</span>
      Browse Rooms
    </a>
  </div>
</main>

<footer class="absolute bottom-8 text-xs text-on-surface-variant/40">© 2024 Joga Together. All rights reserved.</footer>
<script src="/js/main.js"></script>
<script src="/js/pages/404.js"></script>
</body>
</html>
