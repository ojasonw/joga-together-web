name: Dev Deploy - joga-together-web

on:
  push:
    branches: [ "dev" ]

jobs:
  build_and_push:
    name: Build e Push imagem dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ojasonw/joga-together-web:dev

  update_gitops_dev:
    name: Atualiza overlay dev no GitOps
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: ojasonw/homelab-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Commit e push direto
        run: |
          git config user.email "22104080+gfidlab-ci-user@users.noreply.github.com"
          git config user.name "gfidlab-ci-user"
          echo "# last-deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ) sha: ${GITHUB_SHA::7}" \
            > infra/joga-together/overlays/dev/.last-deploy
          git add infra/joga-together/overlays/dev/.last-deploy
          git diff --staged --quiet || git commit -m "chore: deploy joga-together-web dev (${GITHUB_SHA::7})"
          git push
