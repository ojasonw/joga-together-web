</div>
<div class="w-full max-w-md mx-auto">
<div class="flex gap-8 mb-10 border-b border-outline-variant/10">
<button class="pb-4 text-sm font-bold uppercase tracking-widest text-primary border-b-2 border-primary-container transition-all">Sign In</button>
<button class="pb-4 text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-on-surface transition-all">Sign Up</button>
</div>
<div class="space-y-6">
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-high rounded-lg hover:bg-surface-bright transition-colors border border-outline-variant/5 group">

<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-xs uppercase tracking-widest text-on-surface-variant/60 font-bold">Or continue with email</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<form class="space-y-4">
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Email Address</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary-container rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="commander@joga.gg" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold">Password</label>
<a class="text-xs font-semibold text-primary-fixed-dim hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary-container rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-4 bg-primary-container hover:bg-inverse-primary text-on-primary-container font-bold rounded-lg shadow-lg shadow-primary-container/20 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2 group" type="submit">
<span>Enter Arena</span>
<span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
</div>
<p class="mt-10 text-center text-on-surface-variant/60 text-xs">
By entering the arena, you agree to our <br/>
<a class="underline hover:text-on-surface transition-colors" href="#">Terms of Service</a> and <a class="underline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>.
</p>
</div>
</section>
</main>
<!-- Background Decorative Elements -->

<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] rounded-full bg-secondary-container/5 blur-[100px]"></div>
</div>
