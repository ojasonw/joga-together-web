server {
    listen 8081;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    error_page 404 /404.html;

    # Redireciona /index.html para /
    if ($request_uri ~ ^/index\.html$) {
        return 301 /;
    }

    # Redireciona /pagina.html para /pagina
    if ($request_uri ~ ^/(.+)\.html$) {
        return 301 /$1;
    }

    # Remove trailing slash (exceto root /)
    if ($request_uri ~ ^/(.+)/$) {
        return 301 /$1;
    }

    location /api/ {
        proxy_pass http://joga-together:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 https://$http_host/dashboard;
    }

    location / {
        # Tenta: arquivo exato → index.html do diretório → .html na raiz → página em pages/ → 404
        try_files $uri $uri/index.html $uri.html /pages$uri.html =404;
    }

    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
