server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /pages/404.html;

    # Redireciona raiz (/) e /index.html para /dashboard
    if ($request_uri ~ ^(/|/index\.html)$) {
        return 301 /dashboard;
    }

    # Redireciona /pages/pagina.html para /pagina (URLs limpas)
    if ($request_uri ~ ^/pages/(.+)\.html$) {
        return 301 /$1;
    }

    # Redireciona /pagina.html para /pagina (URLs limpas)
    if ($request_uri ~ ^/(.+)\.html$) {
        return 301 /$1;
    }

    # Remove trailing slash (exceto root /)
    if ($request_uri ~ ^/(.+)/$) {
        return 301 /$1;
    }

    location / {
        # Tenta: arquivo exato → /pages/pagina.html → /pages/ (para directory index) → 404
        try_files $uri /pages$uri.html /pages$uri/index.html =404;
    }

    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
